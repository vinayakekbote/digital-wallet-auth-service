    server:
      port: 8081

    spring:
      application:
        name: auth-service

      datasource:
        url: jdbc:mysql://localhost:3306/digital_wallet_auth
        username: root
        password: 1234

      jpa:
        hibernate:
          ddl-auto: update

        show-sql: true

        properties:
          hibernate:
            format_sql: true

      servlet:
        multipart:
          max-file-size: 10MB
          max-request-size: 10MB

    logging:
      level:
        org.springframework.security: DEBUG

    management:
      endpoints:
        web:
          exposure:
            include: "*"
